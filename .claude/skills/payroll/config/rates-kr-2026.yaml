# 한국 급여 표준 요율 - 2026년
# 매년 1월 업데이트 필요
# 출처: 국세청, 국민연금공단, 국민건강보험공단, 고용노동부 (2025년 12월 발표 기준)

# ─────────────────────────────────────────────
# 급여 구조 표준
# ─────────────────────────────────────────────
salary_structure:
  meal_allowance_default: 200000        # 식대 기본값 (비과세 한도와 동일)
  base_hours: 209                       # 월 소정근로시간 (주 40시간 기준)

# ─────────────────────────────────────────────
# 가산수당 — 한국 노동법 "법정 최저 기준" (참고용)
#
# 주의:
#   - 회사마다 단체협약·취업규칙으로 더 높게 줄 수 있음 (낮추는 건 위법)
#   - 5인 미만 사업장은 법정 가산수당 의무 자체가 없음 → 회사 자율
#   - 실제 회사가 적용하는 가산율은 company.yaml의 pay_rules로 지정
#   - 급여변동.md에는 "회사가 실제 적용한 가산율 + 계산된 수당 금액"을 적음
#     (코드는 적힌 금액을 그대로 합산하지, 가산율로 재계산하지 않음)
# ─────────────────────────────────────────────
labor_law_minimum:
  # 5인 이상 사업장 법정 최저 가산율 (근로기준법 §56)
  over_5:
    overtime_rate: 1.5                  # 연장근로 (1일 8시간/주 40시간 초과) - 50% 이상 가산
    holiday_rate_within_8h: 1.5         # 휴일근로 8시간 이내 - 50% 이상 가산
    holiday_rate_over_8h: 2.0           # 휴일근로 8시간 초과분 - 100% 이상 가산
    night_extra_rate: 0.5               # 야간근로(22~06시) - 추가 50% 가산

  # 5인 미만 사업장: 법정 의무 없음 (회사 자율)
  under_5:
    overtime_rate: 1.0                  # 가산 의무 없음 — 통상시급만 지급도 합법
    holiday_rate_within_8h: 1.0
    holiday_rate_over_8h: 1.0
    night_extra_rate: 0.0
    note: "5인 미만은 법정 의무가 없을 뿐, 회사가 자체 기준으로 가산해서 줄 수 있음"

# ─────────────────────────────────────────────
# 4대보험 요율 (2026년)
# ─────────────────────────────────────────────
insurance:
  # 국민연금 (2026년 인상: 9% → 9.5%, 25년만 최초 인상)
  national_pension:
    employee_rate: 0.0475
    employer_rate: 0.0475
    total_rate: 0.095
    ceiling: 6370000                    # 기준소득월액 상한 (매년 7월 조정)
    floor: 400000                       # 기준소득월액 하한

  # 건강보험 (2026년 인상: 7.09% → 7.19%)
  health_insurance:
    employee_rate: 0.03595
    employer_rate: 0.03595
    total_rate: 0.0719

  # 장기요양보험 (건보료의 비율, 2026년 인상: 12.95% → 13.14%)
  long_term_care:
    rate: 0.1314

  # 고용보험 (2026년 동결)
  employment_insurance:
    employee_rate: 0.009
    employer_rate: 0.009                # 사업장 규모별 추가 요율 별도
    total_rate: 0.018

  # 산재보험 (사업주만 부담, 업종별 상이, 2026년 12월 확정 예정)
  industrial_accident:
    default_employer_rate: 0.007        # 일반 사무/서비스업 약 0.7% (업종 확인 필요)

# ─────────────────────────────────────────────
# 두루누리 사회보험료 지원
# ─────────────────────────────────────────────
durumuri:
  support_rate: 0.8                     # 80% 지원
  applies_to:
    - national_pension
    - employment_insurance
  conditions:
    max_salary: 2700000                 # 월 270만원 미만
    max_employees: 10                   # 10인 미만 사업장
    new_subscriber_only: true           # 2021년부터 신규가입자만
    no_insurance_history_months: 12     # 직전 12개월 4대보험 이력 없음
  exclusions:
    property_threshold: 600000000       # 재산 과세표준 6억 이상
    income_threshold: 43000000          # 종합소득 4,300만 이상
  check_criteria: |
    신규입사자 입사 시 확인사항:
    1. 월급여 270만원 미만인가?
    2. 직전 1년간 4대보험 가입 이력이 없는가?
    3. 재산/소득 기준 충족하는가?
    → 해당 시 세무사에게 두루누리 신청 요청

# ─────────────────────────────────────────────
# 비과세 한도
# ─────────────────────────────────────────────
tax_exemption:
  meal_allowance: 200000                # 식대 비과세 한도 (월 20만원)
  childcare: 100000                     # 자녀보육수당 비과세 한도 (월 10만원, 6세 이하)
  vehicle_allowance: 200000             # 자가운전보조금 비과세 한도 (월 20만원)

# ─────────────────────────────────────────────
# 소득세
# ─────────────────────────────────────────────
income_tax:
  local_tax_rate: 0.1                   # 지방소득세 = 소득세의 10%
  # 실제 계산은 income_tax_table.json (간이세액표 334구간) 참조

# ─────────────────────────────────────────────
# 퇴직금
# ─────────────────────────────────────────────
retirement:
  min_service_days: 365                 # 퇴직금 발생 최소 근속일수 (1년)
  # 평균임금 = 최근 3개월 총 급여 / 3개월 총 일수
  # 통상임금 = (기본급 + 식대 등 정기지급) × 3 / 총일수
  # 퇴직금 = max(평균임금, 통상임금) × 30 × (재직일수 / 365)

# ─────────────────────────────────────────────
# 메타데이터
# ─────────────────────────────────────────────
metadata:
  version: "2026.1"
  last_updated: "2026-01-21"
  notes: |
    - 2026년 요율 반영 (2025년 12월 발표 기준)
    - 국민연금 기준소득월액 상/하한은 매년 7월 조정
    - 산재보험 요율은 2026년 12월 확정 예정
    - 5인 이상 사업장은 가산수당 의무 (overtime_rate_over_5 사용)
